jenkins:
  systemMessage: "Jenkins CI/CD Automation Server for Telephony Microservices Project."
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER}"
          password: "${JENKINS_ADMIN_PASSWORD}"
          description: "Administrator User"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

# Configure credentials
credentials:
  system:
    domainCredentials:
      - credentials:
          # AWS ECR Deployment credentials
          - usernamePassword:
              scope: GLOBAL
              id: "aws-credentials"
              username: "${AWS_ACCESS_KEY_ID}"
              password: "${AWS_SECRET_ACCESS_KEY}"
              description: "AWS Access Credentials for ECR Registry"
          
          # GitHub API Access Token (for checkout and repository triggers)
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "${GITHUB_USER}"
              password: "${GITHUB_TOKEN}"
              description: "GitHub API Authentication Token"
          
          # SSH Private Key for EC2 remote deployments
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "ssh-private-key"
              username: "ubuntu"
              privateKeySource:
                directEntry:
                  privateKey: "${SSH_PRIVATE_KEY}"
              description: "SSH Private Key for EC2 remote deployments"

          # Kubeconfig file for Kubernetes remote deployments
          - file:
              scope: GLOBAL
              id: "kubeconfig"
              fileName: "kubeconfig"
              secretBytes: "${KUBECONFIG_CONTENT}"
              description: "Kubeconfig for Kubernetes remote deployments"

# Automatically create pipeline jobs using Job DSL
jobs:
  - script: |
      pipelineJob('telephony-ec2') {
        description('Pipeline for the Standalone EC2 Deployment')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/' + System.getenv('GITHUB_USER') + '/Telephony.git')
                  credentialsId('github-credentials')
                }
                branch('*/freeswitch')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *') // Poll GitHub every 5 minutes
        }
      }
  - script: |
      pipelineJob('telephony-missed-call') {
        description('Pipeline for the Missed Call Campaign variant')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/' + System.getenv('GITHUB_USER') + '/Telephony.git')
                  credentialsId('github-credentials')
                }
                branch('*/freeswitch-kubernetes')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *') // Poll GitHub every 5 minutes
        }
      }
  - script: |
      pipelineJob('telephony-ivr') {
        description('Pipeline for the Multilingual IVR Campaign variant')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/' + System.getenv('GITHUB_USER') + '/Telephony.git')
                  credentialsId('github-credentials')
                }
                branch('*/freeswitch-ivr-kubernetes')
              }
            }
            scriptPath('Jenkinsfile')
          }
        }
        triggers {
          scm('H/5 * * * *') // Poll GitHub every 5 minutes
        }
      }
